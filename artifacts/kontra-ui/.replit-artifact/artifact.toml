kind = "web"
previewPath = "/"
title = "Kontra UI Dashboard"
version = "1.0.0"
id = "artifacts/kontra-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23452

[services.development]
run = "pnpm --filter @workspace/kontra-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kontra-ui", "run", "build" ]
publicDir = "artifacts/kontra-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23452"
BASE_PATH = "/"
