<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontra</title>
    <!-- Optional: replace or remove if causing 404 -->
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Instant branded splash — shown before React boots, fades out on mount -->
    <style>
      #kontra-splash {
        position: fixed; inset: 0;
        background: #0a0a0f;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px; z-index: 9999;
        transition: opacity 0.35s ease;
      }
      #kontra-splash.ks-out { opacity: 0; pointer-events: none; }
      .ks-logo {
        width: 52px; height: 52px; background: #800020;
        border-radius: 14px; display: flex;
        align-items: center; justify-content: center;
        box-shadow: 0 0 40px rgba(128,0,32,0.55);
        animation: ksPulse 2s ease-in-out infinite;
      }
      .ks-k {
        color: #fff; font-size: 24px; font-weight: 900;
        font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
        letter-spacing: -0.05em; line-height: 1;
      }
      .ks-track {
        width: 180px; height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 99px; overflow: hidden; position: relative;
      }
      .ks-fill {
        position: absolute; top: 0; left: -60%; width: 60%; height: 100%;
        background: linear-gradient(90deg,transparent,#800020,transparent);
        animation: ksScan 1.35s ease-in-out infinite;
        border-radius: 99px;
      }
      .ks-label {
        color: #444; font-size: 10px; font-weight: 600;
        letter-spacing: 0.18em; text-transform: uppercase;
        font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      }
      @keyframes ksPulse {
        0%,100% { box-shadow: 0 0 30px rgba(128,0,32,0.4); }
        50%      { box-shadow: 0 0 64px rgba(128,0,32,0.75); }
      }
      @keyframes ksScan {
        0%   { left: -60%; }
        100% { left: 100%; }
      }
    </style>

    <script>
      (() => {
        const errorPatterns = [
          /\bui is not defined\b/i,
          /can't find variable:\s*ui/i,
          /failed to fetch dynamically imported module/i,
          /importing a module script failed/i,
          /\bsrc is not defined\b/i,
          /\bcomponents is not defined\b/i,
          /\bloginform is not defined\b/i,
        ];

        const shouldHandle = (value) => {
          const text = String(value || "");
          return errorPatterns.some((pattern) => pattern.test(text));
        };

        const renderFallback = (reason) => {
          if (window.__kontraStartupErrorShown) return;
          window.__kontraStartupErrorShown = true;

          const root = document.getElementById("root");
          if (!root) return;

          const hasRetried = new URL(window.location.href).searchParams.get("startupRetry") === "1";
          if (!hasRetried) {
            const retryUrl = new URL(window.location.href);
            retryUrl.searchParams.set("startupRetry", "1");
            retryUrl.searchParams.set("r", String(Date.now()));
            window.location.replace(retryUrl.toString());
            return;
          }

          root.innerHTML = `
            <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020617;color:#e2e8f0;padding:24px;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
              <div style="max-width:640px;border:1px solid rgba(251,113,133,.35);background:rgba(136,19,55,.22);border-radius:12px;padding:16px;line-height:1.5;">
                <h1 style="margin:0 0 8px;font-size:18px;">Kontra failed to load</h1>
                <p style="margin:0 0 12px;font-size:14px;color:#fecdd3;">${String(reason || "A startup error occurred.")}</p>
                <button id="kontra-reload" style="background:#f8fafc;color:#0f172a;border:none;border-radius:8px;padding:8px 12px;font-weight:600;cursor:pointer;">Reload app</button>
              </div>
            </div>
          `;

          const button = document.getElementById("kontra-reload");
          if (button) {
            button.addEventListener("click", () => {
              const url = new URL(window.location.href);
              url.searchParams.set("r", String(Date.now()));
              window.location.replace(url.toString());
            });
          }
        };

        window.addEventListener("error", (event) => {
          const message = event?.error?.message || event?.message || "";
          if (shouldHandle(message)) {
            renderFallback(message);
          }
        });

        window.addEventListener("unhandledrejection", (event) => {
          const message = event?.reason?.message || event?.reason || "";
          if (shouldHandle(message)) {
            renderFallback(message);
          }
        });
      })();
    </script>
  </head>
  <body style="margin:0;background:#0a0a0f;">
    <!-- Splash is rendered instantly, removed once React first paints -->
    <div id="kontra-splash">
      <div class="ks-logo"><span class="ks-k">K</span></div>
      <div class="ks-track"><div class="ks-fill"></div></div>
      <span class="ks-label">Kontra</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hard fallback: always remove splash within 4s even if React never mounts
      (function() {
        function dismissSplashFallback() {
          var el = document.getElementById('kontra-splash');
          if (!el || el.style.display === 'none') return;
          el.classList.add('ks-out');
          setTimeout(function() {
            if (el.parentNode) el.parentNode.removeChild(el);
          }, 400);
        }
        setTimeout(dismissSplashFallback, 1500);
      })();
    </script>
  </body>
</html>
